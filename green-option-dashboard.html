<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Option · Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Metropolis:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1a3a52;
            --navy-light: #2d5a7b;
            --gold: #d4a574;
            --green: #2d9e75;
            --red: #e05555;
            --bg: #f0f4f8;
            --white: #ffffff;
            --text: #1a2a3a;
            --text-muted: #6b7c93;
            --border: #dde3ec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Metropolis', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── PIN SCREEN ── */
        #pinScreen {
            position: fixed;
            inset: 0;
            background: var(--navy);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 32px;
        }

        .pin-logo {
            text-align: center;
        }

        .pin-logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
        }

        .pin-logo p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .pin-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 320px;
        }

        .pin-dots {
            display: flex;
            gap: 12px;
        }

        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transition: background 0.2s;
        }

        .pin-dot.filled { background: var(--gold); }

        .pin-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 14px;
            color: white;
            font-family: 'Metropolis', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 8px;
            text-align: center;
            width: 100%;
            outline: none;
        }

        .pin-input::placeholder { color: rgba(255,255,255,0.2); letter-spacing: 4px; }

        .pin-btn {
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 10px;
            padding: 14px 40px;
            font-family: 'Metropolis', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .pin-btn:hover { opacity: 0.9; }

        .pin-error {
            color: #ff6b6b;
            font-size: 13px;
            display: none;
        }

        /* ── DASHBOARD ── */
        #dashboard { display: none; }

        .topbar {
            background: var(--navy);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .topbar-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
        }

        .topbar-title span {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .topbar-date {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
        }

        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ── ADD FORM ── */
        .card {
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--navy);
            letter-spacing: 0.3px;
        }

        .card-body { padding: 24px; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            gap: 16px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'Metropolis', sans-serif;
            font-size: 14px;
            color: var(--text);
            outline: none;
            transition: border 0.2s;
            background: white;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--navy-light);
        }

        .btn-add {
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-family: 'Metropolis', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            white-space: nowrap;
            transition: background 0.2s;
            height: 40px;
        }

        .btn-add:hover { background: var(--navy-light); }

        .days-row {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .day-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f0f4f8;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: var(--text);
        }

        .day-chip button {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }

        .day-chip button:hover { color: var(--red); }

        .btn-addday {
            background: none;
            border: 1px dashed var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-family: 'Metropolis', sans-serif;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-addday:hover {
            border-color: var(--navy);
            color: var(--navy);
        }

        /* ── TABLE ── */
        .table-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: var(--navy);
            color: white;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .btn-refresh {
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 14px;
            font-family: 'Metropolis', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-refresh:hover {
            border-color: var(--navy);
            color: var(--navy);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: #f8fafc;
            border-bottom: 2px solid var(--border);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: #f8fafc; }

        .badge-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e8f7f1;
            color: var(--green);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-web {
            background: #eef2ff;
            color: #4f6ef7;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-staff {
            background: #fef3e8;
            color: #d4830a;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: 700;
        }

        .btn-delete {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 12px;
            font-family: 'Metropolis', sans-serif;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            border-color: var(--red);
            color: var(--red);
            background: #fff5f5;
        }

        .empty-state {
            text-align: center;
            padding: 48px;
            color: var(--text-muted);
        }

        .empty-state .icon { font-size: 32px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        .loading {
            text-align: center;
            padding: 32px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* ── KÜRZEL MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 340px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .modal h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--navy);
        }

        .modal p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: -12px;
        }

        .modal input {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-family: 'Metropolis', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            width: 100%;
            outline: none;
        }

        .modal input:focus { border-color: var(--navy); }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .btn-cancel {
            flex: 1;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Metropolis', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
        }

        .btn-confirm {
            flex: 2;
            background: var(--navy);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Metropolis', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--navy);
            color: white;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            z-index: 999;
            animation: slideUp 0.3s ease;
        }

        .toast.success { background: var(--green); }
        .toast.error { background: var(--red); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pinScreen">
    <div class="pin-logo">
        <h1>🌿 Green Option</h1>
        <p>Hotels Therme Erding · Staff Dashboard</p>
    </div>
    <div class="pin-box">
        <div class="pin-dots" id="pinDots">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>
        <input type="password" class="pin-input" id="pinInput" placeholder="······" maxlength="6" autocomplete="off">
        <button class="pin-btn" onclick="checkPin()">Einloggen</button>
        <span class="pin-error" id="pinError">Falscher Code. Bitte erneut versuchen.</span>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <div class="topbar">
        <div class="topbar-title">
            <div>
                <h1>🌿 Green Option</h1>
                <span>Staff Dashboard · Hotels Therme Erding</span>
            </div>
        </div>
        <div class="topbar-date" id="topbarDate"></div>
    </div>

    <div class="main">
        <!-- ADD FORM -->
        <div class="card">
            <div class="card-header">
                <h2>➕ Eintrag hinzufügen</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Zimmer</label>
                        <input type="text" id="addZimmer" placeholder="z.B. 101" maxlength="3">
                    </div>
                    <div class="form-group">
                        <label>Anreise</label>
                        <input type="date" id="addAnreise">
                    </div>
                    <div class="form-group">
                        <label>Abreise</label>
                        <input type="date" id="addAbreise">
                    </div>
                    <div class="form-group">
                        <label>Kürzel</label>
                        <input type="text" id="addKuerzel" placeholder="z.B. PJ3" maxlength="3" style="text-transform:uppercase">
                    </div>
                    <button class="btn-add" onclick="calculateDays()">Berechnen</button>
                </div>

                <div class="days-row" id="daysRow"></div>

                <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                    <button class="btn-add" onclick="submitEntries()" style="padding: 12px 32px; font-size: 14px;">
                        Einträge speichern
                    </button>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="card">
            <div class="card-header">
                <h2>📋 Aktuelle Einträge</h2>
                <div class="table-controls">
                    <span class="badge" id="entryCount">0</span>
                    <button class="btn-refresh" onclick="loadEntries()">↻ Aktualisieren</button>
                </div>
            </div>
            <div class="card-body" style="padding: 0;">
                <div id="tableContainer">
                    <div class="loading">Daten werden geladen...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- KÜRZEL MODAL (für Löschen) -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>Eintrag löschen</h3>
        <p>Gib deinen Kürzel ein um zu bestätigen.</p>
        <input type="text" id="deleteKuerzel" placeholder="ABC" maxlength="3" style="text-transform:uppercase">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeDeleteModal()">Abbrechen</button>
            <button class="btn-confirm" onclick="confirmDelete()">Löschen</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const PIN = '031099';
    
    // Power Automate URLs (reemplazar con las tuyas)
    const PA_GET_URL = 'https://defaultf76bf23d7f7f41f18c96cf2f261a1d.bf.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/bb96c3466f844fa2affe0b7e3738a708/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=C9rw0Ut2dWHGOoMsyvUbegmSpqNhXKoWMNkl-rBNYLY';
    const PA_POST_URL = 'https://defaultf76bf23d7f7f41f18c96cf2f261a1d.bf.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1bc0e613a2cc4be08f3c5ac067dfbfcc/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=NK0XHD30v1BA3o5hfqlyLXDi39nLTxJHB4WtW2U4_x0';
    const PA_DELETE_URL = 'https://defaultf76bf23d7f7f41f18c96cf2f261a1d.bf.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/284cd873db5148849a32d41aff557bbc/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=PDTHHbhH9VfhdoMHqkfsMpQ2llpZW77eSCYUfrnJH2c';

    let pendingDays = [];
    let deleteTargetId = null;
    let entries = [];

    // ── PIN ──
    document.getElementById('pinInput').addEventListener('input', function() {
        const dots = document.querySelectorAll('.pin-dot');
        dots.forEach((dot, i) => {
            dot.classList.toggle('filled', i < this.value.length);
        });
    });

    document.getElementById('pinInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkPin();
    });

    function checkPin() {
        const val = document.getElementById('pinInput').value;
        if (val === PIN) {
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            initDashboard();
        } else {
            document.getElementById('pinError').style.display = 'block';
            document.getElementById('pinInput').value = '';
            document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('filled'));
        }
    }

    // ── INIT ──
    function initDashboard() {
        // Fecha en topbar
        const now = new Date();
        document.getElementById('topbarDate').textContent = now.toLocaleDateString('de-DE', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // Fecha mínima en los inputs de fecha
        const today = now.toISOString().split('T')[0];
        document.getElementById('addAnreise').min = today;
        document.getElementById('addAbreise').min = today;
        document.getElementById('addAnreise').value = today;

        loadEntries();
    }

    // ── LOAD ENTRIES ──
    async function loadEntries() {
        document.getElementById('tableContainer').innerHTML = '<div class="loading">Daten werden geladen...</div>';
        
        try {
            const response = await fetch(PA_GET_URL, { method: 'POST' });
            const data = await response.json();
            entries = Array.isArray(data) ? data : (data.value || []);
            renderTable(entries);
        } catch (error) {
            console.error(error);
            document.getElementById('tableContainer').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Fehler beim Laden der Daten.</p></div>';
        }
    }

    function getTodayFormatted() {
        const today = new Date();
        return today.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    function renderTable(data) {
        document.getElementById('entryCount').textContent = data.length;

        if (data.length === 0) {
            document.getElementById('tableContainer').innerHTML = `
                <div class="empty-state">
                    <div class="icon">🌿</div>
                    <p>Keine aktuellen Einträge vorhanden.</p>
                </div>`;
            return;
        }

        const rows = data.map(entry => `
            <tr>
                <td><strong>${entry.Zimmer}</strong></td>
                <td>${entry.Datum}</td>
                <td><span class="${entry.Kuerzel === 'Web' ? 'badge-web' : 'badge-staff'}">${entry.Kuerzel || 'Web'}</span></td>
                <td><button class="btn-delete" onclick="openDeleteModal('${entry.ID || entry.Id || entry.id}')">Löschen</button></td>
            </tr>
        `).join('');

        document.getElementById('tableContainer').innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Zimmer</th>
                        <th>Datum</th>
                        <th>Kürzel</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
    }

    // ── ADD ENTRIES ──
    function calculateDays() {
        const zimmer = document.getElementById('addZimmer').value.trim();
        const anreise = document.getElementById('addAnreise').value;
        const abreise = document.getElementById('addAbreise').value;
        const kuerzel = document.getElementById('addKuerzel').value.trim().toUpperCase();

        if (!zimmer) { showToast('Bitte Zimmernummer eingeben', 'error'); return; }
        if (!anreise || !abreise) { showToast('Bitte Anreise und Abreise eingeben', 'error'); return; }
        if (!kuerzel) { showToast('Bitte Kürzel eingeben', 'error'); return; }

        const start = new Date(anreise);
        const end = new Date(abreise);

        if (end <= start) { showToast('Abreise muss nach Anreise liegen', 'error'); return; }

        // Calcular días sin limpieza: desde el día después de llegada hasta el día antes de salida
        pendingDays = [];
        const current = new Date(start);
        current.setDate(current.getDate() + 1); // primer día sin limpieza = día después de llegada

        while (current < end) {
            const datumFormatted = current.toLocaleDateString('de-DE', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            });
            pendingDays.push({ zimmer, datum: datumFormatted, kuerzel });
            current.setDate(current.getDate() + 1);
        }

        if (pendingDays.length === 0) {
            showToast('Keine Tage ohne Reinigung (mindestens 2 Nächte)', 'error');
            return;
        }

        if (pendingDays.length > 5) {
            showToast(`${pendingDays.length} Tage berechnet (maximal 5 erlaubt)`, 'error');
            pendingDays = pendingDays.slice(0, 5);
        }

        renderDays();
        showToast(`${pendingDays.length} Tag(e) ohne Reinigung berechnet`, 'success');
    }

    function renderDays() {
        const row = document.getElementById('daysRow');
        row.innerHTML = pendingDays.map((d, i) => `
            <div class="day-chip">
                Zimmer ${d.zimmer} · ${d.datum}
                <button onclick="removeDay(${i})">×</button>
            </div>
        `).join('');
    }

    function removeDay(index) {
        pendingDays.splice(index, 1);
        renderDays();
    }

    async function submitEntries() {
        if (pendingDays.length === 0) {
            showToast('Bitte mindestens einen Tag hinzufügen', 'error');
            return;
        }

        for (const day of pendingDays) {
            const data = {
                id: Math.random().toString(36).substring(2, 10).toUpperCase(),
                zimmer: day.zimmer,
                datum: day.datum,
                uhrzeit: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }),
                status: 'Keine Reinigung',
                zeitstempel: new Date().toLocaleString('de-DE'),
                kuerzel: day.kuerzel
            };

            await fetch(PA_POST_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        showToast(`${pendingDays.length} Eintrag/Einträge gespeichert ✓`, 'success');
        pendingDays = [];
        renderDays();
        document.getElementById('addZimmer').value = '';
        document.getElementById('addKuerzel').value = '';
        document.getElementById('addAnreise').value = new Date().toISOString().split('T')[0];
        document.getElementById('addAbreise').value = '';
        await loadEntries();
    }

    // ── DELETE ──
    function openDeleteModal(id) {
        deleteTargetId = id;
        document.getElementById('deleteKuerzel').value = '';
        document.getElementById('deleteModal').classList.add('open');
    }

    function closeDeleteModal() {
        deleteTargetId = null;
        document.getElementById('deleteModal').classList.remove('open');
    }

    async function confirmDelete() {
        const kuerzel = document.getElementById('deleteKuerzel').value.trim().toUpperCase();
        if (!kuerzel) {
            showToast('Bitte Kürzel eingeben', 'error');
            return;
        }

        closeDeleteModal();

        try {
            await fetch(PA_DELETE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itemId: deleteTargetId })
            });
            showToast('Eintrag gelöscht ✓', 'success');
            await loadEntries();
        } catch (error) {
            console.error(error);
            showToast('Fehler beim Löschen', 'error');
        }
    }

    // ── TOAST ──
    function showToast(msg, type = '') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
</script>
</body>
</html>
